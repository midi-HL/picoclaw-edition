name: Build Windows x64

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd web/frontend
          pnpm install --frozen-lockfile
          pnpm build:backend

      - name: Build Windows x64 binary
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -tags "goolm stdjson" \
            -ldflags "-s -w" \
            -o dist/picoclaw-windows-x64.exe \
            ./cmd/picoclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-windows-x64
          path: dist/picoclaw-windows-x64.exe
          retention-days: 7
